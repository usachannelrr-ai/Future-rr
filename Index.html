<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future RR</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f172a,#1e293b,#020617);
  color:white;
  text-align:center;
}

h1 {
  font-size:42px;
  margin-top:40px;
}

p {
  color:#cbd5f5;
}

.btn {
  padding:15px 30px;
  background: linear-gradient(45deg,#22c55e,#06b6d4);
  border:none;
  border-radius:12px;
  color:white;
  font-size:18px;
  cursor:pointer;
}

.container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  margin-top:30px;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding:20px;
  margin:15px;
  border-radius:15px;
  width:250px;
}

input {
  padding:10px;
  margin:10px;
  border-radius:8px;
  border:none;
}

</style>
</head>

<body>

<h1>🚀 Future RR</h1>
<p>Upload Reels & Earn Money Globally</p>

<button class="btn">Start Earning</button>

<div class="container">

  <div class="card">
    <h3>👤 User Panel</h3>
    <p>Signup & Earnings Dashboard</p>
  </div>

  <div class="card">
    <h3>🎬 Upload Reel</h3>
    <input type="file">
  </div>

  <div class="card">
    <h3>💰 Earnings</h3>
    <p>Balance: ₹0</p>
  </div>

  <div class="card">
    <h3>🏢 Campaign</h3>
    <p>Coming Soon</p>
  </div>

</div>

</body>
</html>
